<!-- =========================================================
     YI OASIS — "Our Space" photo gallery section
     Paste the <section> block below into index.html, placed
     right after the closing </section> tag of "Our Story"
     (id="about") and before the "Values & Purpose" section.

     Paste the CSS block into your existing <style>...</style>
     block, anywhere near the other section styles (e.g. right
     after the ".story" rules).

     To add more photos later: upload the new file to the repo
     root the same way, then copy one .gallery-item <div> block
     and change the src + alt text.
     ========================================================= -->

<!-- ===== 1) HTML — paste into the page body ===== -->
<section class="gallery" id="gallery">
  <div class="container">
    <span class="eyebrow">Take a Look Inside</span>
    <h2 class="section-title">Our Space</h2>
    <div class="gallery-grid">
      <div class="gallery-item reveal">
        <img src="shop%20front1.jpeg" alt="Yi Oasis shop front" loading="lazy">
      </div>
      <div class="gallery-item reveal">
        <img src="business%20class%20pod.jpeg" alt="Yi Oasis business-class massage pod seating" loading="lazy">
      </div>
      <div class="gallery-item reveal">
        <img src="business%20class%20pod%20individual.jpeg" alt="Yi Oasis individual business-class massage pod" loading="lazy">
      </div>
      <!-- Add more photos by duplicating this block:
      <div class="gallery-item reveal">
        <img src="ANOTHER-FILENAME.jpeg" alt="Describe this photo" loading="lazy">
      </div>
      -->
    </div>
  </div>
</section>

<!-- ===== 2) CSS — paste into the <style> block ===== -->
<style>
.gallery{ background:var(--cream); padding:64px 0; }
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
  margin-top:36px;
}
.gallery-item{
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
  transition:.3s;
}
.gallery-item:hover{ transform:translateY(-8px); }
.gallery-item img{
  width:100%;
  height:320px;
  object-fit:cover;
  display:block;
  transition:.4s;
}
.gallery-item:hover img{ transform:scale(1.05); }
@media(max-width:768px){
  .gallery-item img{ height:240px; }
}
</style>
